<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dayisi Web</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: linear-gradient(180deg, #ffffff 0%, #e6eefc 100%);
    }

    .page {
      width: min(100%, 960px);
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      padding: 3rem;
      border: 1px solid rgba(15, 23, 42, 0.06);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, #4f46e5, #3b82f6);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 4vw, 3.8rem);
      line-height: 1.05;
    }

    p {
      max-width: 720px;
      margin: 1.5rem 0 2rem;
      font-size: 1.05rem;
      line-height: 1.8;
      color: #475569;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .button {
      border: none;
      border-radius: 999px;
      padding: 0.95rem 1.8rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      background: #4f46e5;
      color: white;
      box-shadow: 0 12px 30px rgba(79, 70, 229, 0.22);
    }

    .button-secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    footer {
      margin-top: 2rem;
      color: #64748b;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="brand">
      <div class="logo">D</div>
      <div>
        <strong>Dayisi Web</strong>
        <div style="color: #64748b; font-size: 0.95rem;">Simple, modern web presence</div>
      </div>
    </div>

    <h1>Deployment Successful.</h1>
    <p>Dayisi Web brings clean design and fast performance together in a simple landing page. Use this page as your starting point for a portfolio, agency, or personal website.</p>

    <div class="actions">
      <button class="button button-primary">Get Started</button>
      <button class="button button-secondary">Learn More</button>
    </div>

    <footer>
      Crafted for Dayisi Web — ready to customize and deploy.
    </footer>
  </main>
</body>
</html>
